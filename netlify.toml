[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, s-maxage=300, stale-while-revalidate=86400"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[edge_functions]]
  path = "/api/gallery.json"
  function = "gallery"
